server {
    listen 3010;

    # Log real client IP from Cloudflare CF-Connecting-IP header
    access_log /var/log/nginx/client-ip-table-secret cf_ip;

    # Proxy all requests to Next.js standalone server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve original IP log file (ascending) as a downloadable CSV
    location = /client-ip-table-secret {
        alias /var/log/nginx/client-ip-table-secret;
        default_type text/csv;
        add_header Content-Disposition 'attachment; filename="client-ip-table-secret.csv"';
        add_header Cache-Control 'no-store, no-cache';
    }

    # Serve IP log file sorted by timestamp (descending) as a downloadable CSV via local CGI script
    location = /client-ip-table-secret-desc {
        proxy_pass http://127.0.0.1:8080/cgi-bin/download.sh;
    }
}
